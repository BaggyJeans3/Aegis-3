# 원래대로 주석 유지 (이미 정적으로 빌드된 경우)
#load_module /etc/nginx/modules/ngx_http_coraza_module.so;

user  root;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ---------------------------------------------------------
    # 2. 이지스3 (Coraza WAF) 핵심 설정 (유지)
    # ---------------------------------------------------------
    coraza on; 
    coraza_rules_file /etc/nginx/coraza.conf;
    # ---------------------------------------------------------

    server {
        listen       80;
        server_name  localhost;

        # --- 마스킹 미들웨어 옵션 적용 구간 ---
        location / {
            proxy_pass http://localhost:3000;
            
            # --- 마스킹 미들웨어 옵션 (Nginx 표준 방식) ---
            sub_filter_once off;                   # 여러 번 나와도 다 바꿈
            sub_filter_types text/html;   # HTML 내 모든 텍스트 검사
            
            # 구체적인 마스킹 대상 지정 (패턴이 고정일 때 사용)
            sub_filter '010-9999-8888' '010-9999-****';
            sub_filter '900101-1234567' '900101-1******';
            # ------------------------------------------

            proxy_set_header Accept-Encoding "";   # 압축 해제 필수
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        # ---------------------------------------

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
    }
}
