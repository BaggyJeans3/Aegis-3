# ==============================
# Aegis-3 Custom Coraza Rules
# ==============================
# Purpose:
# - Keep OWASP CRS as the baseline generic WAF rule set.
# - Add Aegis-3 specific rules that Cloudflare WAF / CRS do not know from service context.

# [100010] Shadow API / decoy endpoint access
SecRule REQUEST_URI "@rx ^/api/v1/(admin|internal|debug|backup|hidden|test)(?:/|$)" \
    "id:100010,phase:1,deny,status:403,log,auditlog,msg:'Aegis-3 Shadow API or Decoy Endpoint Access Detected',tag:'aegis3-shadow-api'"

# [100020] Spring Boot Actuator exposure probing
SecRule REQUEST_URI "@rx ^/(?:actuator|actuator/env|actuator/heapdump|actuator/loggers)(?:/|$)" \
    "id:100020,phase:1,deny,status:403,log,auditlog,msg:'Aegis-3 Spring Boot Actuator Access Detected',tag:'aegis3-spring-boot'"

# [100030] Sensitive project / infrastructure file probing
SecRule REQUEST_URI "@rx (?i)(?:/\.env|/\.git|/\.svn|/\.idea|/application\.properties|/application\.yml|/application\.yaml|/docker-compose\.ya?ml|/Dockerfile|/gradle\.properties|/package-lock\.json|/nginx\.conf|/coraza\.conf)" \
    "id:100030,phase:1,deny,status:403,log,auditlog,msg:'Aegis-3 Sensitive Project File Access Detected',tag:'aegis3-sensitive-file',t:urlDecodeUni,t:lowercase"

# [100040] Unknown API version/path policy
# Current prototype assumes public API paths should start with /api/v1/.
SecRule REQUEST_URI "@beginsWith /api/" \
    "id:100040,phase:1,deny,status:404,log,auditlog,chain,msg:'Aegis-3 Unknown API Version Access Detected',tag:'aegis3-api-policy'"
    SecRule REQUEST_URI "!@rx ^/api/v1(?:/|$)"

# [100080] Mass assignment / privilege field injection attempt
SecRule REQUEST_URI "@rx ^/api/v1/(?:members|users)(?:/|$)" \
    "id:100080,phase:2,deny,status:403,log,auditlog,chain,msg:'Aegis-3 Mass Assignment Suspicious Parameter Detected',tag:'aegis3-mass-assignment'"
    SecRule ARGS_NAMES "@rx (?i)^(?:role|roles|admin|isAdmin|authority|authorities|balance|point|createdAt|updatedAt)$"

# [100090] Common scanner User-Agent detection
# This is only a low-effort scanner filter. It is easy to bypass, so treat it as supplemental.
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(?:sqlmap|nikto|nmap|masscan|acunetix|nessus|wpscan|dirbuster|gobuster|ffuf|zgrab|python-requests|curl|wget)" \
    "id:100090,phase:1,deny,status:403,log,auditlog,msg:'Aegis-3 Known Scanner User-Agent Detected',tag:'aegis3-scanner-ua'"
