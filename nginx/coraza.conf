# ==============================
# Aegis-3 Coraza WAF Main Config
# ==============================
# This file is the single entry point loaded by nginx.conf:
#   coraza_rules_file /etc/nginx/coraza.conf;
# OWASP CRS and Aegis-3 custom rules are included from here.

SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json
SecDataDir /tmp

# Request body limits for demo/prototype safety
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# Audit log
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:4|5)"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/coraza/audit.log

# [100] Coraza WAF health-check rule
# Test: curl -i "http://localhost/?aegis_test=1"
SecRule ARGS:aegis_test "@streq 1" \
    "id:100,phase:2,block,status:403,log,auditlog,msg:'Aegis-3 WAF Test Rule Triggered'"

# OWASP Core Rule Set
# Files live under nginx/crs locally and are mounted to /etc/nginx/crs in the container.
Include /etc/nginx/crs-setup.conf
Include /etc/nginx/crs/rules/*.conf

# Aegis-3 service-specific custom rules
Include /etc/nginx/rules/aegis3-custom-rules.conf
