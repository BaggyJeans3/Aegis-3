# 엔진 기본 설정
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json
SecDataDir /tmp

# [규칙 101] SQL 인젝션 차단
# URL 파라미터와 전체 경로를 감시하여 SQL 공격 패턴 감지 시 403 차단
SecRule REQUEST_URI|ARGS "@rx (?i)(?:'|--|#|/\*|OR\s+\d=\d)" \
    "id:101,phase:2,deny,status:403,log,msg:'SQL Injection Detected'"

# [규칙 102] XSS 공격 차단
# %3C 같은 인코딩된 공격도 잡아내기 위해 urlDecodeUni 적용 및 입구(phase:1)에서 차단
SecRule REQUEST_URI|ARGS "@rx (?i)<script" \
    "id:102,phase:1,deny,status:403,log,msg:'XSS Detected',t:urlDecodeUni"
