load_module /usr/lib/nginx/modules/ngx_http_coraza_module.so;

user nginx;
worker_processes 1;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format aegis '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'request_id=$request_id';

    access_log /var/log/nginx/access.log aegis;

    sendfile on;
    keepalive_timeout 65;

    # Aegis-3 WAF Layer: Coraza 활성화
    coraza on;
    coraza_rules_file /etc/nginx/coraza.conf;
    coraza_transaction_id "aegis3-$request_id";

    upstream aegis_proxy {
        server proxy:3000;
    }

    server {
        listen 80;
        server_name localhost _;

        location / {
            proxy_pass http://aegis_proxy;

            # --- 개인정보 마스킹 미들웨어 ---
            sub_filter_once off;
            sub_filter_types application/json text/html;
            sub_filter '010-9999-8888' '010-9999-****';
            sub_filter '900101-1234567' '900101-1******';

            # sub_filter가 응답 본문을 수정할 수 있도록 압축 비활성화
            proxy_set_header Accept-Encoding "";

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

#        error_page 403 /403.json;
#        location = /403.json {
#            internal;
#            default_type application/json;
#            return 403 '{"status":"blocked","message":"Blocked by Aegis-3 Coraza WAF"}';
#        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
